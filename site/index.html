<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sift — the aliases hiding in your shell history</title>
  <meta name="description" content="Sift reads your shell history and hands you ready-to-paste aliases and functions, ranked by how many keystrokes each one saves. Runs in your browser; nothing is uploaded." />
  <meta property="og:title" content="Sift — the aliases hiding in your shell history" />
  <meta property="og:description" content="Drop in your .zsh_history or .bash_history and get ready-to-paste aliases ranked by keystrokes saved. Everything runs locally in your browser." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2214%22%20fill%3D%22%230a0d12%22/%3E%3Crect%20x%3D%221%22%20y%3D%221%22%20width%3D%2262%22%20height%3D%2262%22%20rx%3D%2213%22%20fill%3D%22none%22%20stroke%3D%22%233ee08c%22%20stroke-opacity%3D%220.35%22%20stroke-width%3D%222%22/%3E%3Ctext%20x%3D%2232%22%20y%3D%2241%22%20font-family%3D%22monospace%22%20font-size%3D%2226%22%20font-weight%3D%22700%22%20fill%3D%22%233ee08c%22%20text-anchor%3D%22middle%22%3E%26gt%3B_%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <nav class="topnav">
      <span class="brand">sift</span>
      <a class="gh-link" href="https://github.com/ctkrug/shell-alias-miner" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>GitHub</span>
      </a>
    </nav>

    <header class="site-header">
      <h1 class="wordmark">sift<span class="cursor" aria-hidden="true"></span></h1>
      <p class="tagline">
        Drop in your shell history. Get back the aliases you should have
        written months ago, ranked by the keystrokes they save.
      </p>
    </header>

    <div class="terminal">
      <div class="titlebar">
        <span class="dots" aria-hidden="true">
          <span class="dot dot-red"></span>
          <span class="dot dot-amber"></span>
          <span class="dot dot-green"></span>
        </span>
        <span class="titlebar-label">~/sift</span>
      </div>

      <div class="terminal-body">
        <section id="drop-zone">
          <label for="history-file">
            Choose your <code>.zsh_history</code> or <code>.bash_history</code> file
          </label>
          <input type="file" id="history-file" />
        </section>

        <p id="status" role="status"></p>

        <section id="thresholds" hidden>
          <label>
            Min occurrences
            <input type="number" id="min-occurrences" min="0" value="3" inputmode="numeric" />
          </label>
          <label>
            Min keystrokes saved
            <input type="number" id="min-savings" min="0" value="20" inputmode="numeric" />
          </label>
        </section>

        <div class="table-wrap">
          <table id="results" hidden>
            <thead>
              <tr>
                <th>Alias</th>
                <th>Type</th>
                <th>Definition</th>
                <th>Seen</th>
                <th>Keystrokes saved</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      Runs entirely in your browser via WebAssembly — nothing is uploaded.
    </footer>
  </div>

  <script src="wasm_exec.js"></script>
  <script src="main.js"></script>
</body>
</html>
